<!DOCTYPE html>
<html>
<head>
    <title>Adjektivquiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
        }
        #question {
            font-size: 20px;
            margin: 20px;
        }
        #score {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Adjektivquiz</h1>
    <div id="score">Poäng: 0</div>
    <div id="question">Klicka på "Starta quiz" för att börja!</div>
    <div id="options">
        <button onclick="startQuiz()">Starta quiz</button>
    </div>

    <script>
        const adjektiv = ["stor", "liten", "gammal", "ny", "vacker", "ful", "svår", "lätt", "glad", "ledsen"];
        const substantiv = [
            { ord: "bok", genus: "en" },
            { ord: "hus", genus: "ett" },
            { ord: "bil", genus: "en" }
        ];

        let currentQuestion = 0;
        let score = 0;
        let questions = [];

        function startQuiz() {
            document.getElementById("options").innerHTML = "";
            genereraFragor();
            visaFraga();
        }

        function genereraFragor() {
            questions = [];
            for (let i = 0; i < 5; i++) { // 5 frågor för enkelhetens skull
                const adj = adjektiv[Math.floor(Math.random() * adjektiv.length)];
                const subst = substantiv[Math.floor(Math.random() * substantiv.length)];
                const grupp = Math.random() < 0.5 ? "A" : "B"; // Förenklat

                let questionText;
                if (grupp === "A") {
                    questionText = `Vilken grupp tillhör adjektivet i "${subst.genus === "en" ? "en" : "ett"} ${adj} ${subst.ord}"?`;
                } else {
                    questionText = `Vilken grupp tillhör adjektivet i "den ${adj}a ${subst.ord}${subst.genus === "en" ? "n" : "t"}"?`;
                }

                questions.push({
                    text: questionText,
                    correct: grupp,
                    adj: adj,
                    subst: subst.ord
                });
            }
        }

        function visaFraga() {
            if (currentQuestion >= questions.length) {
                document.getElementById("question").textContent = `Quiz klar! Ditt resultat: ${score} av ${questions.length}`;
                return;
            }

            const q = questions[currentQuestion];
            document.getElementById("question").textContent = q.text;
            document.getElementById("options").innerHTML = `
                <button onclick="checkAnswer('A')">A</button>
                <button onclick="checkAnswer('B')">B</button>
            `;
        }

        function checkAnswer(selected) {
            const q = questions[currentQuestion];
            if (selected === q.correct) {
                score++;
                document.getElementById("score").textContent = `Poäng: ${score}`;
                document.getElementById("question").textContent += " ✅ Rätt!";
            } else {
                document.getElementById("question").textContent += ` ❌ Fel! Rätt svar var ${q.correct}.`;
            }

            currentQuestion++;
            setTimeout(visaFraga, 1500);
        }
    </script>
</body>
</html>
